<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Выбор папки с музыкой</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1d24;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Toolbar */
    .toolbar {
      padding: 12px 16px;
      background: #252932;
      border-bottom: 1px solid #374151;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .path-bar {
      flex: 1;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: monospace;
      color: #9ca3af;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button {
      padding: 8px 16px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    button:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    button.secondary {
      background: #374151;
    }

    button.secondary:hover {
      background: #4b5563;
    }

    button.danger {
      background: #dc2626;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    /* Stats */
    .stats {
      padding: 8px 16px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    /* Items */
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .item:hover {
      background: #374151;
    }

    .item.selected {
      background: #3b82f6;
      color: white;
    }

    .icon {
      font-size: 20px;
      width: 32px;
      text-align: center;
    }

    .name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }

    .info {
      font-size: 11px;
      color: #6b7280;
    }

    .item.selected .info {
      color: rgba(255,255,255,0.7);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Footer */
    .footer {
      padding: 16px;
      border-top: 1px solid #374151;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: #252932;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1f2937;
    }

    ::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="path-bar" id="pathDisplay">/</div>
    <button id="upBtn" class="secondary">⬆ Наверх</button>
    <button id="homeBtn" class="secondary">🏠 Домой</button>
  </div>
  
  <div class="stats" id="stats">
    <span>📁 Загрузка...</span>
    <span>🎵 -</span>
  </div>
  
  <div class="content" id="content">
    <div class="empty">
      <div class="icon">📂</div>
      <div>Выберите папку с музыкой</div>
    </div>
  </div>
  
  <div class="footer">
    <button id="cancelBtn" class="secondary">Отмена</button>
    <button id="selectBtn">✅ Выбрать эту папку</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    
    let currentPath = '';
    let items = [];
    let selectedPath = '';
    let audioFilesCount = 0;
    
    const AUDIO_EXTS = new Set([
  // Основные форматы
  "mp3", "wav", "flac", "aac", "ogg", "m4a", "m4b", "m4r", "m4p",
  // Видео с аудиодорожкой
  "mp4", "mpeg", "mpga", "mp2", "mpa",
  // Другие аудиоформаты
  "opus", "wma", "wmv", "aiff", "aif", "aifc", "caf", "alac", 
  "ape", "dsf", "dff", "dvf", "gsm", "ircam", "m3u", "mka", 
  "mlp", "ra", "rm", "snd", "tak", "tta", "voc", "vox", "wv",
  // Редкие форматы
  "3gp", "amr", "awb", "dct", "dss", "dvms", "m4v", "mkv", "mov",
  "mpv", "oga", "ogv", "ogx", "spx", "webm"
]);
    
    async function loadDirectory(dirPath) {
      if (!dirPath) return;
      
      currentPath = dirPath;
      document.getElementById('pathDisplay').textContent = dirPath;
      document.getElementById('pathDisplay').title = dirPath;
      
      try {
        const result = await ipcRenderer.invoke('folder-browser:scan', dirPath);
        if (result.success) {
          items = result.items;
          audioFilesCount = items.filter(i => !i.isDirectory && AUDIO_EXTS.has(i.extension)).length;
          renderItems();
          updateStats();
        } else {
          showError('Не удалось прочитать папку');
        }
      } catch (err) {
        showError('Ошибка: ' + err.message);
      }
    }
    
    function updateStats() {
      const foldersCount = items.filter(i => i.isDirectory).length;
      document.getElementById('stats').innerHTML = `
        <span>📁 Папок: ${foldersCount}</span>
        <span>🎵 Аудиофайлов: ${audioFilesCount}</span>
      `;
    }
    
    function renderItems() {
      const container = document.getElementById('content');
      
      if (items.length === 0 && currentPath) {
        container.innerHTML = '<div class="empty"><div class="icon">📁</div><div>Папка пуста</div></div>';
        return;
      }
      
      container.innerHTML = '';
      
      // Добавляем ".." для навигации вверх (кроме корня)
      const isRoot = currentPath === pathParse(currentPath).root;
      if (!isRoot) {
        const parentDiv = createItemElement({
          name: '..',
          path: pathParse(currentPath).dir,
          isDirectory: true,
          isParent: true
        });
        container.appendChild(parentDiv);
      }
      
      // Показываем все элементы
      for (const item of items) {
        const div = createItemElement(item);
        container.appendChild(div);
      }
    }
    
    function createItemElement(item) {
      const div = document.createElement('div');
      div.className = 'item';
      if (selectedPath === item.path) {
        div.classList.add('selected');
      }
      
      const isAudio = !item.isDirectory && AUDIO_EXTS.has(item.extension);
      const icon = item.isDirectory ? '📁' : (isAudio ? '🎵' : '📄');
      
      div.innerHTML = `
        <div class="icon">${icon}</div>
        <div class="name">${escapeHtml(item.name)}</div>
        <div class="info">${item.isDirectory ? 'Папка' : formatSize(item.size)}</div>
      `;
      
      if (item.isDirectory) {
        // Двойной клик - войти в папку
        div.ondblclick = () => loadDirectory(item.path);
        // Одиночный клик - выбрать папку
        div.onclick = (e) => {
          e.stopPropagation();
          selectedPath = item.path;
          renderItems();
        };
      } else if (isAudio) {
        // Аудиофайл показываем но не даём выбрать
        div.style.opacity = '0.6';
        div.style.cursor = 'default';
      } else {
        div.style.opacity = '0.3';
        div.style.cursor = 'default';
      }
      
      return div;
    }
    
    function pathParse(p) {
      const sep = p.includes('\\') ? '\\' : '/';
      const parts = p.split(sep);
      const fileName = parts[parts.length - 1];
      const dir = parts.slice(0, -1).join(sep);
      const root = sep === '\\' ? parts[0] + '\\' : '/';
      return { dir, root, base: fileName };
    }
    
    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function showError(msg) {
      const container = document.getElementById('content');
      container.innerHTML = `<div class="empty"><div class="icon">⚠️</div><div>${msg}</div></div>`;
    }
    
    // Обработчики кнопок
    document.getElementById('upBtn').onclick = () => {
      const parent = pathParse(currentPath).dir;
      if (parent !== currentPath) {
        loadDirectory(parent);
      }
    };
    
    document.getElementById('homeBtn').onclick = () => {
      const home = process.env.USERPROFILE || process.env.HOME || 'C:\\';
      loadDirectory(home);
    };
    
    document.getElementById('selectBtn').onclick = () => {
      const folderToSelect = selectedPath || currentPath;
      if (audioFilesCount === 0) {
        const confirm = window.confirm('В этой папке нет аудиофайлов. Всё равно выбрать?');
        if (!confirm) return;
      }
      ipcRenderer.send('folder-browser:select', folderToSelect);
    };
    
    document.getElementById('cancelBtn').onclick = () => {
      ipcRenderer.send('folder-browser:cancel');
    };
    
    // Загружаем начальную папку (документы или рабочий стол)
    window.onload = async () => {
      const startPath = process.env.USERPROFILE + '\\Music' || 
                       process.env.HOME + '/Music' || 
                       'C:\\';
      loadDirectory(startPath);
    };
  </script>
</body>
</html>
